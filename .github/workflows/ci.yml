name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dih_dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build client
        run: npm run build

      - name: Health smoke test
        env:
          NODE_ENV: test
          PORT: 4000
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/dih_dev
          JWT_SECRET: ci-secret
        run: |
          npm --workspace server run start &
          SERVER_PID=$!
          # Poll the health endpoint until it reports connected (max ~30s).
          for i in $(seq 1 30); do
            BODY=$(curl -s http://localhost:4000/api/health || true)
            echo "Attempt $i: $BODY"
            if echo "$BODY" | grep -q '"db":"connected"'; then
              echo "Health check passed."
              kill $SERVER_PID
              exit 0
            fi
            sleep 1
          done
          echo "Health check did not report connected in time."
          kill $SERVER_PID
          exit 1
